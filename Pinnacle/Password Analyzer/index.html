<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Analyzer</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Password Analyzer</h1>
    <p>Evaluate password strength and receive security recommendations.</p>

    <div class="input-box">
        <input type="password" id="password" placeholder="Enter Password">

        <button id="toggleBtn">
            Show
        </button>
    </div>

    <button id="checkBtn">
        Analyze Password
    </button>

    <div class="progress">
        <div id="strengthBar"></div>
    </div>

    <h2 id="strengthText">Strength : -</h2>

    <h3>Score</h3>
    <p id="score">0 / 100</p>

    <h3>Password Requirements</h3>

    <ul id="requirements">
        <li id="length">❌ Minimum 8 characters</li>
        <li id="upper">❌ Uppercase Letter</li>
        <li id="lower">❌ Lowercase Letter</li>
        <li id="number">❌ Number</li>
        <li id="symbol">❌ Special Character</li>
    </ul>

    <h3>Security Suggestions</h3>

    <ul id="suggestions"></ul>

    <button id="generateBtn">
        Generate Strong Password
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
